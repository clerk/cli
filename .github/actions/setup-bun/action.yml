name: Setup Bun
description: Install Bun, optionally restore dependency cache, and run bun install

inputs:
  cache:
    description: >
      Cache mode for Bun dependencies.
      "none" skips caching, "restore" uses read-only cache restore.
      The cache is populated by the warm-bun-cache.yml workflow on push to
      main; PR and workflow_call runs only restore.
    default: "none"

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2

    - name: Restore Bun cache
      if: inputs.cache == 'restore'
      uses: actions/cache/restore@v5
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: bun-${{ runner.os }}-

    - run: bun install --frozen-lockfile
      shell: bash
