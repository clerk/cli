name: Setup Bun
description: Install Bun, optionally restore dependency cache, and run bun install

inputs:
  cache:
    description: >
      Cache mode for Bun dependencies.
      "none" skips caching, "restore" uses read-only cache restore,
      "read-write" populates the cache after install.
    default: "none"

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2

    # Restore on both 'restore' and 'read-write'. Save is the only difference.
    - name: Restore Bun cache
      if: inputs.cache != 'none'
      uses: actions/cache/restore@v5
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: bun-${{ runner.os }}-

    - run: bun install --frozen-lockfile
      shell: bash

    # Save only from trusted contexts. PR-triggered runs (github.event_name
    # == 'pull_request') skip the save so PR-controlled code cannot poison
    # the cache for future runs. Push to main and workflow_call invocations
    # from release.yml (which inherit 'push' or 'issue_comment') do save.
    - name: Save Bun cache
      if: inputs.cache == 'read-write' && github.event_name != 'pull_request'
      uses: actions/cache/save@v5
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
