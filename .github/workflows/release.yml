name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      release_created: ${{ steps.release.outputs['packages/cli--release_created'] }}
      tag_name: ${{ steps.release.outputs['packages/cli--tag_name'] }}
      version: ${{ steps.release.outputs['packages/cli--version'] }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4

  # ─── Stable release ────────────────────────────────────────────────

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/build-binaries.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
      ref: ${{ github.sha }}
      artifact-prefix: clerk

  smoke-test:
    needs: [release-please, build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
            bin: ./clerk
          - target: darwin-x64
            runner: macos-15-large
            bin: ./clerk
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            bin: ./clerk
          - target: linux-arm64-musl
            runner: ubuntu-24.04-arm
            bin: ./clerk
            docker: alpine
          - target: linux-x64
            runner: ubuntu-latest
            bin: ./clerk
          - target: linux-x64-musl
            runner: ubuntu-latest
            bin: ./clerk
            docker: alpine
          - target: win32-x64
            runner: windows-latest
            bin: ./clerk.exe
          # win32-arm64: no GitHub-hosted ARM Windows runner available — binary is
          # published untested (best-effort). Build-time format verification confirms
          # it is a valid PE32+/Aarch64 binary but execution is not validated.
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: clerk-${{ matrix.target }}
      - name: Make executable
        if: runner.os != 'Windows'
        run: chmod +x ${{ matrix.bin }}
      - name: Smoke test (native)
        if: ${{ !matrix.docker }}
        shell: bash
        run: |
          expected="${{ needs.release-please.outputs.version }}"
          actual=$(${{ matrix.bin }} --version)
          echo "Binary reports $actual (expected $expected)"
          if [ "$actual" != "$expected" ]; then
            echo "::error::Version mismatch: expected $expected, got $actual"
            exit 1
          fi
      - name: Smoke test (docker)
        if: ${{ matrix.docker }}
        run: |
          expected="${{ needs.release-please.outputs.version }}"
          actual=$(docker run --rm -v "$PWD:/work" ${{ matrix.docker }} /work/${{ matrix.bin }} --version)
          echo "Binary reports $actual (expected $expected)"
          if [ "$actual" != "$expected" ]; then
            echo "::error::Version mismatch: expected $expected, got $actual"
            exit 1
          fi

  publish-npm:
    needs: [release-please, build, smoke-test]
    # Must run on GitHub-hosted runner for npm OIDC trusted publishing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          pattern: clerk-*
          path: dist/artifacts

      - name: Publish packages
        run: bun run scripts/releaser/index.ts
        env:
          ARTIFACTS_DIR: ${{ github.workspace }}/dist/artifacts

  upload-github-assets:
    needs: [release-please, build, smoke-test, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: clerk-*
          path: dist/artifacts

      - name: Upload binaries to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          for dir in dist/artifacts/clerk-*/; do
            target=${dir#dist/artifacts/clerk-} && target=${target%/}
            ext=""; [[ "$target" == win32-* ]] && ext=".exe"
            gh release upload "$tag" "${dir}clerk${ext}#clerk-${target}${ext}"
          done

  # ─── Canary release ────────────────────────────────────────────────

  canary-version:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created != 'true' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute canary version
        id: version
        run: |
          base=$(jq -r '.["packages/cli"]' .release-please-manifest.json)
          sha=$(git rev-parse --short=7 HEAD)
          echo "version=${base}-canary.${sha}" >> "$GITHUB_OUTPUT"

  canary-build:
    needs: canary-version
    uses: ./.github/workflows/build-binaries.yml
    with:
      version: ${{ needs.canary-version.outputs.version }}
      ref: ${{ github.sha }}
      artifact-prefix: clerk-canary

  # Canary smoke tests cover a subset of targets for speed/cost. Full matrix runs
  # on stable releases. darwin-arm64 + linux-x64 cover the two most common dev
  # platforms; musl is included since it runs on the same ubuntu-latest runner.
  canary-smoke-test:
    needs: [canary-version, canary-build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
            bin: ./clerk
          - target: linux-x64
            runner: ubuntu-latest
            bin: ./clerk
          - target: linux-x64-musl
            runner: ubuntu-latest
            bin: ./clerk
            docker: alpine
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: clerk-canary-${{ matrix.target }}
      - name: Make executable
        if: ${{ !matrix.docker }}
        run: chmod +x ${{ matrix.bin }}
      - name: Smoke test (native)
        if: ${{ !matrix.docker }}
        shell: bash
        run: |
          expected="${{ needs.canary-version.outputs.version }}"
          actual=$(${{ matrix.bin }} --version)
          echo "Binary reports $actual (expected $expected)"
          if [ "$actual" != "$expected" ]; then
            echo "::error::Version mismatch: expected $expected, got $actual"
            exit 1
          fi
      - name: Smoke test (docker)
        if: ${{ matrix.docker }}
        run: |
          expected="${{ needs.canary-version.outputs.version }}"
          actual=$(docker run --rm -v "$PWD:/work" ${{ matrix.docker }} /work/${{ matrix.bin }} --version)
          echo "Binary reports $actual (expected $expected)"
          if [ "$actual" != "$expected" ]; then
            echo "::error::Version mismatch: expected $expected, got $actual"
            exit 1
          fi

  canary-publish:
    needs: [canary-version, canary-build, canary-smoke-test]
    # Must run on GitHub-hosted runner for npm OIDC trusted publishing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          pattern: clerk-canary-*
          path: dist/artifacts

      - name: Rename artifact directories
        run: |
          cd dist/artifacts
          for dir in clerk-canary-*/; do
            target=${dir#clerk-canary-} && target=${target%/}
            mv "$dir" "clerk-${target}"
          done

      - name: Publish canary packages
        run: bun run scripts/releaser/index.ts --tag canary --version "$CANARY_VERSION"
        env:
          CANARY_VERSION: ${{ needs.canary-version.outputs.version }}
          ARTIFACTS_DIR: ${{ github.workspace }}/dist/artifacts
