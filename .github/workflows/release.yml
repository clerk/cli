name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      release_created: ${{ steps.release.outputs['packages/cli--release_created'] }}
      tag_name: ${{ steps.release.outputs['packages/cli--tag_name'] }}
      version: ${{ steps.release.outputs['packages/cli--version'] }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4

  # ─── Stable release ────────────────────────────────────────────────

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/build-binaries.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
      ref: ${{ github.sha }}
      artifact-prefix: clerk

  smoke-test:
    needs: [release-please, build]
    uses: ./.github/workflows/smoke-test.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
      artifact-prefix: clerk
      preset: stable

  publish-npm:
    needs: [release-please, build, smoke-test]
    # Must run on GitHub-hosted runner for npm OIDC trusted publishing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11
      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          pattern: clerk-*
          path: dist/artifacts

      - name: Publish packages
        run: bun run scripts/releaser/index.ts
        env:
          ARTIFACTS_DIR: ${{ github.workspace }}/dist/artifacts

  upload-github-assets:
    needs: [release-please, build, smoke-test, publish-npm]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: clerk-*
          path: dist/artifacts

      - name: Upload binaries to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          for dir in dist/artifacts/clerk-*/; do
            target=${dir#dist/artifacts/clerk-} && target=${target%/}
            ext=""; [[ "$target" == win32-* ]] && ext=".exe"
            gh release upload "$tag" "${dir}clerk${ext}#clerk-${target}${ext}"
          done

  # ─── Canary release ────────────────────────────────────────────────

  canary-version:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created != 'true' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute canary version
        id: version
        run: |
          base=$(jq -r '.["packages/cli"]' .release-please-manifest.json)
          if [ -z "$base" ] || [ "$base" = "null" ]; then
            echo "::error::Could not read base version from .release-please-manifest.json"
            exit 1
          fi
          sha=$(git rev-parse --short=7 HEAD)
          echo "version=${base}-canary.${sha}" >> "$GITHUB_OUTPUT"

  canary-build:
    needs: canary-version
    uses: ./.github/workflows/build-binaries.yml
    with:
      version: ${{ needs.canary-version.outputs.version }}
      ref: ${{ github.sha }}
      artifact-prefix: clerk-canary

  canary-smoke-test:
    needs: [canary-version, canary-build]
    uses: ./.github/workflows/smoke-test.yml
    with:
      version: ${{ needs.canary-version.outputs.version }}
      artifact-prefix: clerk-canary
      preset: canary

  canary-publish:
    needs: [canary-version, canary-build, canary-smoke-test]
    # Must run on GitHub-hosted runner for npm OIDC trusted publishing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11
      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          pattern: clerk-canary-*
          path: dist/artifacts

      - name: Rename artifact directories
        run: |
          cd dist/artifacts
          for dir in clerk-canary-*/; do
            target=${dir#clerk-canary-} && target=${target%/}
            mv "$dir" "clerk-${target}"
          done

      - name: Publish canary packages
        run: bun run scripts/releaser/index.ts --tag canary --version "$CANARY_VERSION"
        env:
          CANARY_VERSION: ${{ needs.canary-version.outputs.version }}
          ARTIFACTS_DIR: ${{ github.workspace }}/dist/artifacts
