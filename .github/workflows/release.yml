name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      release_created: ${{ steps.release.outputs['packages/cli--release_created'] }}
      tag_name: ${{ steps.release.outputs['packages/cli--tag_name'] }}
      version: ${{ steps.release.outputs['packages/cli--version'] }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4

  # ─── Stable release ────────────────────────────────────────────────

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/build-binaries.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
      ref: ${{ github.sha }}
      artifact-prefix: clerk

  smoke-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
            bin: ./clerk
          - target: darwin-x64
            runner: macos-13
            bin: ./clerk
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            bin: ./clerk
          - target: linux-arm64-musl
            runner: ubuntu-24.04-arm
            bin: ./clerk
            docker: alpine
          - target: linux-x64
            runner: ubuntu-latest
            bin: ./clerk
          - target: linux-x64-musl
            runner: ubuntu-latest
            bin: ./clerk
            docker: alpine
          - target: win32-x64
            runner: windows-latest
            bin: ./clerk.exe
          # win32-arm64: no GitHub-hosted ARM Windows runner available
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: clerk-${{ matrix.target }}
      - name: Make executable
        if: runner.os != 'Windows'
        run: chmod +x ${{ matrix.bin }}
      - name: Smoke test (native)
        if: ${{ !matrix.docker }}
        shell: bash
        run: |
          version=$(${{ matrix.bin }} --version)
          echo "Binary reports $version"
      - name: Smoke test (docker)
        if: ${{ matrix.docker }}
        run: |
          docker run --rm -v "$PWD:/work" ${{ matrix.docker }} /work/${{ matrix.bin }} --version

  publish-npm:
    needs: [release-please, build, smoke-test]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts

      - name: Publish packages
        run: bun run scripts/releaser/index.ts
        env:
          ARTIFACTS_DIR: ${{ github.workspace }}/dist/artifacts
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  upload-github-assets:
    needs: [release-please, build, smoke-test, publish-npm]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts

      - name: Upload binaries to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          for dir in dist/artifacts/clerk-*/; do
            target=${dir#dist/artifacts/clerk-} && target=${target%/}
            ext=""; [[ "$target" == win32-* ]] && ext=".exe"
            gh release upload "$tag" "${dir}clerk${ext}#clerk-${target}${ext}"
          done

  # ─── Canary release ────────────────────────────────────────────────

  canary-version:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created != 'true' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute canary version
        id: version
        run: |
          base=$(jq -r '.["packages/cli"]' .release-please-manifest.json)
          sha=$(git rev-parse --short=7 HEAD)
          echo "version=${base}-canary.${sha}" >> "$GITHUB_OUTPUT"

  canary-build:
    needs: canary-version
    uses: ./.github/workflows/build-binaries.yml
    with:
      version: ${{ needs.canary-version.outputs.version }}
      ref: ${{ github.sha }}
      artifact-prefix: clerk-canary

  canary-publish:
    needs: [canary-version, canary-build]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          pattern: clerk-canary-*
          path: dist/artifacts

      - name: Rename artifact directories
        run: |
          cd dist/artifacts
          for dir in clerk-canary-*/; do
            target=${dir#clerk-canary-} && target=${target%/}
            mv "$dir" "clerk-${target}"
          done

      - name: Publish canary packages
        run: bun run scripts/releaser/index.ts --tag canary --version "$CANARY_VERSION"
        env:
          CANARY_VERSION: ${{ needs.canary-version.outputs.version }}
          ARTIFACTS_DIR: ${{ github.workspace }}/dist/artifacts
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
