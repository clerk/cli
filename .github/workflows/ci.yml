name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Run tests
        run: |
          failed=0
          for f in $(find src -name '*.test.ts' | sort); do
            if ! bun test "$f"; then
              failed=1
            fi
          done
          exit $failed
