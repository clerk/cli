name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run lint

  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Run tests
        run: |
          failed=0
          for f in $(find src -name '*.test.ts' | sort); do
            if ! bun test "$f"; then
              failed=1
            fi
          done
          exit $failed
