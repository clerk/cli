name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci-checks.yml
    with:
      # Prevent fork PRs from running E2E tests and using this repo's secrets.
      # Also skip Dependabot PRs: Dependabot cannot access Actions secrets, so
      # CLERK_CLI_TEST_APP_ID would be empty and the run would fail anyway.
      run-e2e: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' }}
    secrets: inherit
