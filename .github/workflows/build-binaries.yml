name: Build Binaries

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      ref:
        required: true
        type: string
      artifact-prefix:
        required: true
        type: string
        description: "Prefix for artifact names (e.g. 'clerk', 'clerk-canary', 'clerk-snapshot')"

jobs:
  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        # Keep in sync with scripts/releaser/targets.ts
        include:
          - target: darwin-arm64
            bun_target: bun-darwin-arm64
            ext: ""
          - target: darwin-x64
            bun_target: bun-darwin-x64
            ext: ""
          - target: linux-arm64
            bun_target: bun-linux-arm64
            ext: ""
          - target: linux-arm64-musl
            bun_target: bun-linux-arm64-musl
            ext: ""
          - target: linux-x64
            bun_target: bun-linux-x64
            ext: ""
          - target: linux-x64-musl
            bun_target: bun-linux-x64-musl
            ext: ""
          - target: win32-arm64
            bun_target: bun-windows-arm64
            ext: ".exe"
          - target: win32-x64
            bun_target: bun-windows-x64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Build compiled binary
        env:
          CLI_VERSION: ${{ inputs.version }}
        run: |
          bun build --compile \
            --no-compile-autoload-dotenv \
            --target=${{ matrix.bun_target }} \
            --define "CLI_VERSION=\"$CLI_VERSION\"" \
            ./packages/cli-core/src/cli.ts \
            --outfile clerk${{ matrix.ext }}

      - name: Verify binary format
        run: |
          expected_format="${{ matrix.target }}"
          binary="clerk${{ matrix.ext }}"
          file_output=$(file "$binary")
          echo "Binary: $file_output"
          case "$expected_format" in
            darwin-arm64)       echo "$file_output" | grep -q "Mach-O.*arm64" ;;
            darwin-x64)         echo "$file_output" | grep -q "Mach-O.*x86_64" ;;
            linux-arm64*)       echo "$file_output" | grep -q "ELF.*ARM aarch64" ;;
            linux-x64*)         echo "$file_output" | grep -q "ELF.*x86-64" ;;
            win32-arm64)        echo "$file_output" | grep -q "PE32+.*Aarch64" ;;
            win32-x64)          echo "$file_output" | grep -q "PE32+.*x86-64" ;;
            *)                  echo "Unknown target: $expected_format" && exit 1 ;;
          esac
          echo "Binary format verified for $expected_format"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-prefix }}-${{ matrix.target }}
          path: clerk${{ matrix.ext }}
